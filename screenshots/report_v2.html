<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Regression — Semantic Diff Report</title>
<script src="report-data.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --accent: #388bfd;
    --green: #3fb950;
    --yellow: #d29922;
    --orange: #e3812b;
    --red: #f85149;
    --purple: #a371f7;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
    --panel-width: 260px;
    --diff-panel-width: 340px;
    --header-height: 48px;
    --footer-height: 32px;
    --focus-glow: 0 0 0 1px var(--accent);
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
  }

  /* ── App shell ───────────────────────────────────────────────── */

  #app-header {
    flex: 0 0 var(--header-height);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    z-index: 50;
  }

  #app-header h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }

  .header-pills { display: flex; gap: 6px; }

  .h-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 20px; font-size: 11px;
    font-weight: 500; border: 1px solid currentColor; white-space: nowrap;
  }

  .h-pill-count { font-weight: 700; }

  #app-body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

  #app-footer {
    flex: 0 0 var(--footer-height);
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; gap: 14px;
    z-index: 50;
  }

  .footer-hint { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
  .footer-hint-sep { color: var(--border); margin: 0 2px; }

  kbd {
    display: inline-block; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 3px; padding: 0 4px; font-size: 10px; font-family: monospace; color: var(--text2);
  }

  #panel-toggle {
    background: var(--bg3); color: var(--text2); border: 1px solid var(--border);
    border-radius: 5px; padding: 3px 8px; font-size: 12px; cursor: pointer;
    font-family: monospace; flex-shrink: 0;
  }
  #panel-toggle:hover { background: var(--border); color: var(--text); }

  /* ── Sidebar ─────────────────────────────────────────────────── */

  #sidebar {
    flex: 0 0 var(--panel-width); width: var(--panel-width);
    background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    transition: width 0.15s, flex-basis 0.15s;
  }
  #sidebar.collapsed { flex: 0 0 0; width: 0; border-right: none; overflow: hidden; }

  .resize-handle {
    position: absolute; top: 0; right: 0; width: 5px; height: 100%;
    cursor: col-resize; z-index: 10;
  }
  .resize-handle:hover, .resize-handle.dragging { background: var(--accent); opacity: 0.5; }

  #sidebar, #diff-panel { position: relative; }

  #sidebar.pane-focused { box-shadow: inset 0 2px 0 0 var(--accent); }

  #sidebar-header {
    flex: 0 0 auto; padding: 8px; border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
  }

  #sidebar-title {
    font-size: 11px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.06em;
  }

  #sidebar-search {
    width: 100%; background: var(--bg3); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px; padding: 4px 8px; font-size: 12px; outline: none;
  }
  #sidebar-search:focus { border-color: var(--accent); }

  #sidebar-scroll { flex: 1; overflow-y: auto; padding: 4px 0; }

  .sb-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 12px;
    cursor: pointer; border-left: 3px solid transparent;
  }
  .sb-item:hover { background: var(--bg3); }
  .sb-item.selected { background: color-mix(in srgb, var(--accent) 12%, transparent); border-left-color: var(--accent); }
  .sb-item.kb-focused { outline: 1px solid var(--accent); outline-offset: -1px; }

  .sb-name {
    flex: 1; font-size: 12px; font-family: var(--mono);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text2);
  }
  .sb-item.selected .sb-name { color: var(--text); }

  .sb-role { font-size: 10px; color: var(--text3); background: var(--bg3); padding: 1px 5px; border-radius: 3px; }

  .sb-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; white-space: nowrap; }
  .sb-badge.identical { background: color-mix(in srgb, var(--green) 15%, transparent); color: var(--green); }
  .sb-badge.minor { background: color-mix(in srgb, var(--yellow) 15%, transparent); color: var(--yellow); }
  .sb-badge.changed { background: color-mix(in srgb, var(--orange) 15%, transparent); color: var(--orange); }
  .sb-badge.significant { background: color-mix(in srgb, var(--red) 15%, transparent); color: var(--red); }
  .sb-badge.only { background: color-mix(in srgb, var(--purple) 15%, transparent); color: var(--purple); }

  /* ── Diff panel (now between sidebar and viewer) ────────────── */

  #diff-panel {
    flex: 0 0 var(--diff-panel-width); width: var(--diff-panel-width); background: var(--bg2);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    overflow: hidden; transition: width 0.15s, flex-basis 0.15s;
  }
  #diff-panel.collapsed { flex: 0 0 0; width: 0; border-right: none; }

  #diff-panel.pane-focused { box-shadow: inset 0 2px 0 0 var(--accent); }

  #diff-panel-header {
    flex: 0 0 auto; padding: 8px 14px; border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
  }

  .diff-header-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .diff-header-row h3 { font-size: 13px; font-weight: 600; }

  .diff-summary { display: flex; gap: 6px; font-size: 11px; }
  .diff-summary-item { padding: 1px 6px; border-radius: 3px; font-weight: 600; }

  #diff-search {
    width: 100%; background: var(--bg3); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px; padding: 4px 8px; font-size: 12px; outline: none;
  }
  #diff-search:focus { border-color: var(--accent); }

  #diff-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }

  .diff-empty { padding: 24px 14px; text-align: center; color: var(--text3); font-size: 13px; }

  .el-diff { border-bottom: 1px solid var(--border); border-left: 3px solid transparent; }
  .el-diff.importance-critical { border-left-color: var(--red); }
  .el-diff.importance-major { border-left-color: var(--orange); }
  .el-diff.importance-moderate { border-left-color: var(--yellow); }
  .el-diff.importance-minor { border-left-color: var(--border); }
  .el-diff.kb-focused { background: color-mix(in srgb, var(--accent) 12%, transparent); border-left-color: var(--accent); }

  .el-diff-header { padding: 6px 12px; cursor: pointer; }
  .el-diff-header:hover { background: var(--bg3); }
  .el-diff.kb-focused .el-diff-header:hover { background: color-mix(in srgb, var(--accent) 18%, transparent); }

  /* Row 1: badges */
  .el-diff-badges { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }

  .el-diff-importance {
    font-size: 8px; font-weight: 600; padding: 1px 5px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: 0.3px;
    border: 1px solid; background: transparent;
  }
  .el-diff-importance.imp-critical { border-color: var(--red); color: var(--red); }
  .el-diff-importance.imp-major { border-color: var(--orange); color: var(--orange); }
  .el-diff-importance.imp-moderate { border-color: var(--yellow); color: var(--yellow); }
  .el-diff-importance.imp-minor { border-color: var(--text3); color: var(--text3); }

  .el-diff-type {
    font-size: 11px; font-weight: 700; font-family: var(--mono);
    width: 16px; height: 16px; line-height: 16px; text-align: center;
    border-radius: 3px;
  }
  .el-diff-type.changed { background: color-mix(in srgb, var(--orange) 20%, transparent); color: var(--orange); }
  .el-diff-type.added { background: color-mix(in srgb, var(--green) 20%, transparent); color: var(--green); }
  .el-diff-type.removed { background: color-mix(in srgb, var(--red) 20%, transparent); color: var(--red); }
  .el-diff-type.moved { background: color-mix(in srgb, var(--purple) 20%, transparent); color: var(--purple); }
  .el-diff-type.moved\+changed { background: color-mix(in srgb, var(--purple) 20%, transparent); color: var(--purple); }

  /* Row 2: title + count */
  .el-diff-title-row { display: flex; align-items: baseline; gap: 6px; }
  .el-diff-label { font-size: 12px; color: var(--text); flex: 1; line-height: 1.35; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .el-diff.kb-focused .el-diff-label { color: var(--text); }
  .el-diff-count { font-size: 10px; color: var(--text3); flex-shrink: 0; }

  .el-diff-body { display: none; padding: 0 12px 10px 12px; }
  .el-diff.open .el-diff-body { display: block; }
  .el-diff-selector { font-size: 10px; font-family: var(--mono); color: var(--text3); padding: 2px 0 6px; word-break: break-all; }

  /* Group-specific */
  .group-members-preview {
    font-size: 10px; color: var(--text3); padding: 2px 0 0 0; line-height: 1.5;
  }
  .group-members-preview .more { color: var(--accent); }

  .group-changes-summary {
    font-size: 10px; font-family: var(--mono); color: var(--text3); flex-shrink: 0;
  }

  /* Cascade cluster */
  .el-diff.is-cascade { border-left-color: var(--text3); }
  .el-diff.is-cascade .el-diff-type { background: var(--surface2); color: var(--text3); }
  .cascade-delta { font-size: 10px; font-family: var(--mono); color: var(--text3); }
  .cascade-count { font-size: 11px; color: var(--text2); font-weight: 600; }
  .cascade-root-cause {
    font-size: 10px; color: var(--text3); line-height: 1.4; padding: 2px 0 0;
  }
  .cascade-root-cause strong { color: var(--text2); }

  .cascade-section-header {
    margin: 14px 12px 2px; font-size: 10px; text-transform: uppercase;
    letter-spacing: .05em; color: var(--text3);
  }
  .cascade-section-desc {
    margin: 0 12px 8px; font-size: 10px; line-height: 1.5;
    color: var(--text3); opacity: 0.8;
  }

  .group-member-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text2); padding: 5px 8px; margin: 2px 0;
    border-radius: 4px; cursor: pointer; transition: background 0.1s;
  }
  .group-member-item:hover { background: var(--bg3); color: var(--text); }
  .group-member-item .member-label { flex: 1; }
  .group-member-item .member-arrow { color: var(--text3); font-size: 10px; opacity: 0; transition: opacity 0.1s; }
  .group-member-item:hover .member-arrow { opacity: 1; }

  .change-row {
    padding: 5px 0; font-size: 12px;
    border-bottom: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
  }
  .change-row:last-child { border-bottom: none; }

  .change-header {
    display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px;
  }
  .change-prop { font-family: var(--mono); font-size: 11px; color: var(--text2); font-weight: 600; }
  .change-cat { font-size: 9px; font-weight: 600; text-transform: uppercase; color: var(--text3); }

  .change-val-line {
    display: flex; align-items: center; gap: 4px;
    font-family: var(--mono); font-size: 11px; padding: 1px 0 1px 8px;
    word-break: break-all;
  }
  .change-val-line .val-sign { font-weight: 700; width: 10px; flex-shrink: 0; }
  .change-val-line .val-sign.before { color: var(--red); }
  .change-val-line .val-sign.after { color: var(--green); }
  .change-val-line .val-text.before { color: var(--red); }
  .change-val-line .val-text.after { color: var(--green); }
  .change-val-line .val-text.added-note { color: var(--text3); font-style: italic; }

  .color-swatch {
    display: inline-block; width: 14px; height: 14px; border-radius: 3px;
    border: 1px solid var(--border); flex-shrink: 0;
  }

  /* ── Main area ───────────────────────────────────────────────── */

  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  #viewer-header {
    flex: 0 0 auto; background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; padding: 8px 16px; min-height: 48px;
  }

  #viewer-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  #viewer-page { font-size: 14px; font-weight: 600; font-family: var(--mono); white-space: nowrap; }

  .tag {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 4px;
    padding: 1px 6px; font-size: 11px; color: var(--text2); white-space: nowrap;
  }

  #viewer-modes { display: flex; gap: 4px; flex-shrink: 0; }

  .mode-btn {
    background: var(--bg3); color: var(--text2); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
  }
  .mode-btn:hover { background: var(--border); color: var(--text); }
  .mode-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .mode-key {
    display: inline-block; background: rgba(255,255,255,0.15); border-radius: 3px;
    padding: 0 3px; font-size: 9px; font-family: monospace; margin-right: 3px; opacity: 0.8;
  }

  #viewer-content { flex: 1; display: flex; overflow: hidden; min-height: 0; }

  /* ── HTML preview panes ──────────────────────────────────────── */

  #html-panes { flex: 1; display: flex; min-width: 0; }

  .html-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  .html-pane + .html-pane { border-left: 1px solid var(--border); }

  .pane-label {
    flex: 0 0 auto; font-size: 11px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 12px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
  }

  .html-pane iframe { border: none; background: #fff; transform-origin: top left; }

  .iframe-wrap { flex: 1; overflow: hidden; display: flex; }
  .iframe-wrap.align-end { justify-content: flex-end; }
  .iframe-wrap.align-start { justify-content: flex-start; }
  .iframe-wrap.align-center { justify-content: center; }

  .pane-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 13px; }

  #html-panes.single .html-pane.hidden { display: none; }

  /* ── Viewport selector (segmented control) ─────────────── */

  #viewport-selector { display: flex; flex-shrink: 0; }
  #viewport-selector .vp-btn { border-radius: 0; margin: 0; border-right: none; gap: 5px; }
  #viewport-selector .vp-btn:first-child { border-radius: 6px 0 0 6px; }
  #viewport-selector .vp-btn:last-child { border-radius: 0 6px 6px 0; border-right: 1px solid var(--border); }

  .vp-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 5px;
    border-radius: 9px; font-size: 10px; font-weight: 700; line-height: 1;
    background: rgba(255,255,255,0.2); color: inherit;
  }
  .vp-btn.active .vp-badge { background: rgba(255,255,255,0.3); }
  .vp-btn:not(.active) .vp-badge { background: var(--border); color: var(--text2); }
</style>
</head>
<body>

<div id="app-header">
  <button id="panel-toggle" title="Toggle sidebar ([)">[</button>
  <h1>Semantic Diff Report</h1>
  <div class="header-pills" id="header-pills"></div>
</div>

<div id="app-body">
  <div id="sidebar">
    <div id="sidebar-header">
      <span id="sidebar-title">Pages</span>
      <input id="sidebar-search" type="text" placeholder="Filter pages..." autocomplete="off" spellcheck="false">
    </div>
    <div id="sidebar-scroll"></div>
    <div class="resize-handle" data-target="sidebar"></div>
  </div>

  <div id="diff-panel">
    <div id="diff-panel-header">
      <div class="diff-header-row">
        <h3>Changes</h3>
        <div class="diff-summary" id="diff-summary"></div>
      </div>
      <input id="diff-search" type="text" placeholder="Filter changes..." autocomplete="off" spellcheck="false">
    </div>
    <div id="diff-scroll"></div>
    <div class="resize-handle" data-target="diff-panel"></div>
  </div>

  <div id="main">
    <div id="viewer-header">
      <div id="viewer-info">
        <span id="viewer-page">No selection</span>
        <span id="viewer-role" class="tag" style="display:none"></span>
      </div>
      <div id="viewer-modes"></div>
      <div id="viewport-selector"></div>
    </div>

    <div id="viewer-content">
      <div id="html-panes">
        <div class="html-pane" id="pane-before">
          <div class="pane-label">Before</div>
          <div class="pane-empty">No HTML capture</div>
        </div>
        <div class="html-pane" id="pane-after">
          <div class="pane-label">After</div>
          <div class="pane-empty">No HTML capture</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="app-footer">
  <span class="footer-hint">
    <kbd>&larr;</kbd><kbd>&rarr;</kbd> switch pane
    <span class="footer-hint-sep">|</span>
    <kbd>&uarr;</kbd><kbd>&darr;</kbd> navigate
    <span class="footer-hint-sep">|</span>
    <kbd>Enter</kbd> expand/collapse
    <span class="footer-hint-sep">|</span>
    <kbd>1</kbd> Side-by-side <kbd>2</kbd> Before <kbd>3</kbd> After
    <span class="footer-hint-sep">|</span>
    <kbd>V</kbd> viewport
    <span class="footer-hint-sep">|</span>
    <kbd>D</kbd> diff panel
    <span class="footer-hint-sep">|</span>
    <kbd>[</kbd> panels
  </span>
</div>

<script>
(function() {
  'use strict';

  var RAW = window.VR_DATA || {};
  var DATA = Array.isArray(RAW) ? RAW : (RAW.pages || []);
  var DATA_VIEWPORTS = (RAW.viewports && RAW.viewports.length) ? RAW.viewports : [1440];
  var VIEWPORTS = [1440, 768, 375];

  var selected = null;
  var viewMode = 'split';
  var sidebarOpen = true;
  var diffPanelOpen = true;

  // Focused pane: 'sidebar' or 'diff'
  var focusedPane = 'sidebar';
  // Keyboard cursor index within the diff panel (-1 = none)
  var diffCursorIdx = -1;

  var activeViewport = parseInt(localStorage.getItem('vr-viewport') || String(VIEWPORTS[0]));
  if (VIEWPORTS.indexOf(activeViewport) === -1) activeViewport = VIEWPORTS[0];

  // ── Utilities ────────────────────────────────────────────────

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getActiveViewportData(item) {
    if (!item.viewportDiffs) return item;
    return item.viewportDiffs[activeViewport] || item.viewportDiffs[DATA_VIEWPORTS[0]] || item;
  }

  function getStatus(item) {
    var vpData = getActiveViewportData(item);
    if (!vpData.hasBeforeHtml && vpData.hasAfterHtml) return { label: 'new', cls: 'only' };
    if (vpData.hasBeforeHtml && !vpData.hasAfterHtml) return { label: 'removed', cls: 'only' };
    var t = vpData.summary ? vpData.summary.totalChanges : 0;
    if (t === 0) return { label: 'identical', cls: 'identical' };
    if (t < 5) return { label: t + ' changes', cls: 'minor' };
    if (t < 20) return { label: t + ' changes', cls: 'changed' };
    return { label: t + ' changes', cls: 'significant' };
  }

  // ── Pane focus management ───────────────────────────────────

  function setFocusedPane(pane) {
    focusedPane = pane;
    document.getElementById('sidebar').classList.toggle('pane-focused', pane === 'sidebar');
    document.getElementById('diff-panel').classList.toggle('pane-focused', pane === 'diff');
    if (pane === 'sidebar') {
      diffCursorIdx = -1;
      updateDiffCursor();
    }
    if (pane === 'diff' && diffCursorIdx < 0) {
      diffCursorIdx = 0;
      updateDiffCursor();
    }
  }

  // ── Viewport ─────────────────────────────────────────────────

  function getViewportChangeCount(vp) {
    var item = selected != null ? DATA[selected] : null;
    if (!item || !item.viewportDiffs) return 0;
    var vpData = item.viewportDiffs[vp];
    return vpData && vpData.summary ? vpData.summary.totalChanges : 0;
  }

  function buildViewportSelector() {
    var container = document.getElementById('viewport-selector');
    container.innerHTML = VIEWPORTS.map(function(vp, i) {
      var keyHint = i === 0 ? '<span class="mode-key">V</span>' : '';
      var count = getViewportChangeCount(vp);
      var badge = count > 0 ? '<span class="vp-badge">' + count + '</span>' : '';
      return '<button class="mode-btn vp-btn" data-vp="' + vp + '">' + keyHint + vp + badge + '</button>';
    }).join('');
    container.querySelectorAll('.vp-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { setViewport(parseInt(btn.dataset.vp)); });
    });
  }

  function setViewport(vp) {
    activeViewport = vp;
    localStorage.setItem('vr-viewport', String(vp));
    document.querySelectorAll('#viewport-selector .vp-btn').forEach(function(btn) {
      btn.classList.toggle('active', parseInt(btn.dataset.vp) === vp);
    });
    renderDiffPanel();
    renderViewer();
  }

  function cycleViewport() {
    var idx = VIEWPORTS.indexOf(activeViewport);
    var next = VIEWPORTS[(idx + 1) % VIEWPORTS.length];
    setViewport(next);
  }

  function applyViewport() {
    document.querySelectorAll('.iframe-wrap').forEach(function(wrap) {
      var iframe = wrap.querySelector('iframe');
      if (!iframe) return;
      var paneWidth = wrap.clientWidth;
      if (paneWidth === 0) return;
      var zoom = Math.min(1, paneWidth / activeViewport);
      iframe.style.width = activeViewport + 'px';
      iframe.style.height = (wrap.clientHeight / zoom) + 'px';
      iframe.style.zoom = String(zoom);
      iframe.style.transform = '';
      iframe.style.border = (zoom === 1 && activeViewport < paneWidth) ? '1px solid var(--border)' : 'none';
    });
  }

  var vpObserver = new ResizeObserver(function() { applyViewport(); });

  // ── Highlighting via postMessage ─────────────────────────────

  function getChangedProps(diff) {
    if (!diff || !diff.changes) return [];
    return diff.changes.map(function(c) { return c.property; });
  }

  function highlightElement(beforeIdx, afterIdx, type, changedProps) {
    clearHighlights();
    document.querySelectorAll('#html-panes iframe').forEach(function(iframe) {
      var phase = iframe.dataset.phase;
      var idx = phase === 'before' ? beforeIdx : afterIdx;
      if (idx == null) return;
      try {
        iframe.contentWindow.postMessage({
          source: 'vr-report', action: 'highlight', idx: idx,
          type: type || 'changed', changedProps: changedProps || [],
          phase: phase
        }, '*');
      } catch(e) {}
    });
  }

  function clearHighlights() {
    document.querySelectorAll('#html-panes iframe').forEach(function(iframe) {
      try {
        iframe.contentWindow.postMessage({ source: 'vr-report', action: 'clear' }, '*');
      } catch(e) {}
    });
  }

  function highlightAllGroupMembers(group) {
    highlightMemberList(group.members, group.type || 'changed');
  }

  function highlightAllCascadeMembers(cluster) {
    highlightMemberList(cluster.members, 'changed');
  }

  function highlightMemberList(members, type) {
    clearHighlights();
    document.querySelectorAll('#html-panes iframe').forEach(function(iframe) {
      var phase = iframe.dataset.phase;
      var indices = [];
      for (var i = 0; i < members.length; i++) {
        var m = members[i];
        var idx = phase === 'before' ? m.beforeIdx : m.afterIdx;
        if (idx != null) indices.push(idx);
      }
      if (indices.length === 0) return;
      try {
        iframe.contentWindow.postMessage({
          source: 'vr-report', action: 'highlight-multi',
          indices: indices, type: type, phase: phase
        }, '*');
      } catch(e) {}
    });
  }

  // ── Header pills ─────────────────────────────────────────────

  function buildPills() {
    var identical = 0, minor = 0, changed = 0, significant = 0;
    for (var i = 0; i < DATA.length; i++) {
      var s = getStatus(DATA[i]);
      if (s.cls === 'identical') identical++;
      else if (s.cls === 'minor') minor++;
      else if (s.cls === 'changed') changed++;
      else if (s.cls === 'significant') significant++;
    }
    var el = document.getElementById('header-pills');
    var pills = [];
    if (significant) pills.push('<span class="h-pill" style="color:var(--red)"><span class="h-pill-count">' + significant + '</span> significant</span>');
    if (changed) pills.push('<span class="h-pill" style="color:var(--orange)"><span class="h-pill-count">' + changed + '</span> changed</span>');
    if (minor) pills.push('<span class="h-pill" style="color:var(--yellow)"><span class="h-pill-count">' + minor + '</span> minor</span>');
    if (identical) pills.push('<span class="h-pill" style="color:var(--green)"><span class="h-pill-count">' + identical + '</span> identical</span>');
    el.innerHTML = pills.join('');
  }

  // ── Sidebar ──────────────────────────────────────────────────

  function renderSidebar() {
    var query = document.getElementById('sidebar-search').value.trim().toLowerCase();
    var scroll = document.getElementById('sidebar-scroll');
    var items = [];
    for (var i = 0; i < DATA.length; i++) {
      var item = DATA[i];
      if (query && item.page.toLowerCase().indexOf(query) === -1 && item.role.toLowerCase().indexOf(query) === -1) continue;
      items.push({ item: item, idx: i });
    }

    scroll.innerHTML = items.map(function(o) {
      var s = getStatus(o.item);
      var sel = selected === o.idx ? ' selected' : '';
      return '<div class="sb-item' + sel + '" data-idx="' + o.idx + '">'
        + '<span class="sb-name">' + esc(o.item.page) + '</span>'
        + '<span class="sb-role">' + esc(o.item.role) + '</span>'
        + '<span class="sb-badge ' + s.cls + '">' + esc(s.label) + '</span>'
        + '</div>';
    }).join('');

    scroll.querySelectorAll('.sb-item').forEach(function(el) {
      el.addEventListener('click', function() {
        setFocusedPane('sidebar');
        selectItem(parseInt(el.dataset.idx));
      });
    });
  }

  // ── Selection ────────────────────────────────────────────────

  function selectItem(idx) {
    selected = idx;
    diffCursorIdx = -1;
    buildViewportSelector();
    setViewport(activeViewport);
    renderSidebar();
  }

  // ── Viewer ───────────────────────────────────────────────────

  function renderViewer() {
    var item = selected != null ? DATA[selected] : null;
    var pageEl = document.getElementById('viewer-page');
    var roleEl = document.getElementById('viewer-role');
    var modesEl = document.getElementById('viewer-modes');

    if (!item) {
      pageEl.textContent = 'No selection';
      roleEl.style.display = 'none';
      modesEl.innerHTML = '';
      renderEmptyPanes();
      return;
    }

    pageEl.textContent = item.page;
    roleEl.textContent = item.role;
    roleEl.style.display = '';

    var modes = [
      { key: '1', id: 'split', label: 'Side-by-side' },
      { key: '2', id: 'before', label: 'Before' },
      { key: '3', id: 'after', label: 'After' },
    ];
    modesEl.innerHTML = modes.map(function(m) {
      return '<button class="mode-btn' + (viewMode === m.id ? ' active' : '') + '" data-mode="' + m.id + '">'
        + '<span class="mode-key">' + m.key + '</span>' + m.label + '</button>';
    }).join('');
    modesEl.querySelectorAll('.mode-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { viewMode = btn.dataset.mode; renderViewer(); });
    });

    renderPanes(item);
  }

  function renderEmptyPanes() {
    var beforePane = document.getElementById('pane-before');
    var afterPane = document.getElementById('pane-after');
    document.getElementById('html-panes').className = '';
    beforePane.innerHTML = '<div class="pane-label">Before</div><div class="pane-empty">Select a page to view</div>';
    afterPane.innerHTML = '<div class="pane-label">After</div><div class="pane-empty">Select a page to view</div>';
    beforePane.classList.remove('hidden');
    afterPane.classList.remove('hidden');
  }

  function renderPanes(item) {
    var panes = document.getElementById('html-panes');
    var beforePane = document.getElementById('pane-before');
    var afterPane = document.getElementById('pane-after');
    var vpData = getActiveViewportData(item);

    function makeIframe(phase, alignCls) {
      var htmlDir = 'html-' + DATA_VIEWPORTS[0];
      var src = phase + '/' + item.dirName + '/' + htmlDir + '/index.html';
      return '<div class="iframe-wrap ' + alignCls + '"><iframe src="' + esc(src) + '" data-phase="' + phase + '"></iframe></div>';
    }

    var hasBefore = vpData.hasBeforeHtml;
    var hasAfter = vpData.hasAfterHtml;

    if (viewMode === 'split') {
      panes.classList.remove('single');
      beforePane.classList.remove('hidden');
      afterPane.classList.remove('hidden');
      beforePane.innerHTML = '<div class="pane-label">Before</div>' +
        (hasBefore ? makeIframe('before', 'align-end') : '<div class="pane-empty">No HTML capture</div>');
      afterPane.innerHTML = '<div class="pane-label">After</div>' +
        (hasAfter ? makeIframe('after', 'align-start') : '<div class="pane-empty">No HTML capture</div>');
    } else if (viewMode === 'before') {
      panes.classList.add('single');
      beforePane.classList.remove('hidden');
      afterPane.classList.add('hidden');
      beforePane.innerHTML = '<div class="pane-label">Before</div>' +
        (hasBefore ? makeIframe('before', 'align-center') : '<div class="pane-empty">No HTML capture</div>');
    } else {
      panes.classList.add('single');
      afterPane.classList.remove('hidden');
      beforePane.classList.add('hidden');
      afterPane.innerHTML = '<div class="pane-label">After</div>' +
        (hasAfter ? makeIframe('after', 'align-center') : '<div class="pane-empty">No HTML capture</div>');
    }

    vpObserver.disconnect();
    document.querySelectorAll('.iframe-wrap').forEach(function(wrap) { vpObserver.observe(wrap); });
    requestAnimationFrame(applyViewport);
  }

  // ── Diff panel ───────────────────────────────────────────────

  // Currently visible (filtered) diffs and groups for the selected page
  var filteredDiffs = [];
  var filteredGroups = [];
  var filteredCascadeClusters = [];
  var diffItemCount = 0;
  var flatItems = [];

  function matchesQuery(query, d) {
    if (d.label && d.label.toLowerCase().indexOf(query) !== -1) return true;
    if (d.type && d.type.toLowerCase().indexOf(query) !== -1) return true;
    var changes = d.changes || [];
    for (var i = 0; i < changes.length; i++) {
      var c = changes[i];
      if (c.property.toLowerCase().indexOf(query) !== -1) return true;
      if (c.category.toLowerCase().indexOf(query) !== -1) return true;
      if (c.before && c.before.toLowerCase().indexOf(query) !== -1) return true;
      if (c.after && c.after.toLowerCase().indexOf(query) !== -1) return true;
    }
    return false;
  }

  function getFiltered(item) {
    if (!item) return { diffs: [], groups: [], cascadeClusters: [] };
    var vpData = getActiveViewportData(item);
    var query = document.getElementById('diff-search').value.trim().toLowerCase();
    var diffs = vpData.diffs || [];
    var groups = vpData.groups || [];
    var cascadeClusters = vpData.cascadeClusters || [];
    if (!query) return { diffs: diffs, groups: groups, cascadeClusters: cascadeClusters };
    return {
      diffs: diffs.filter(function(d) { return matchesQuery(query, d); }),
      groups: groups.filter(function(g) {
        if (matchesQuery(query, g)) return true;
        for (var i = 0; i < g.members.length; i++) {
          if (g.members[i].label.toLowerCase().indexOf(query) !== -1) return true;
        }
        return false;
      }),
      cascadeClusters: cascadeClusters.filter(function(cc) {
        if (cc.delta && cc.delta.toLowerCase().indexOf(query) !== -1) return true;
        for (var i = 0; i < cc.members.length; i++) {
          if (cc.members[i].label.toLowerCase().indexOf(query) !== -1) return true;
        }
        return false;
      }),
    };
  }

  function renderDiffPanel() {
    var item = selected != null ? DATA[selected] : null;
    var summaryEl = document.getElementById('diff-summary');
    var scrollEl = document.getElementById('diff-scroll');

    var filtered = getFiltered(item);
    filteredGroups = filtered.groups;
    filteredDiffs = filtered.diffs;
    filteredCascadeClusters = filtered.cascadeClusters || [];

    if (!item || (filteredDiffs.length === 0 && filteredGroups.length === 0 && filteredCascadeClusters.length === 0)) {
      summaryEl.innerHTML = '';
      var vpd = item ? getActiveViewportData(item) : null;
      var allCount = vpd ? ((vpd.diffs || []).length + (vpd.groups || []).length + (vpd.cascadeClusters || []).length) : 0;
      var msg = !item ? 'Select a page' : allCount === 0 ? 'No differences detected' : 'No matches';
      scrollEl.innerHTML = '<div class="diff-empty">' + msg + '</div>';
      return;
    }

    var vpData = getActiveViewportData(item);
    var s = vpData.summary || item.summary;
    var parts = [];
    if (s.changed) parts.push('<span class="diff-summary-item" style="background:color-mix(in srgb,var(--orange) 15%,transparent);color:var(--orange)">' + s.changed + ' changed</span>');
    if (s.moved) parts.push('<span class="diff-summary-item" style="background:color-mix(in srgb,var(--purple) 15%,transparent);color:var(--purple)">' + s.moved + ' moved</span>');
    if (s.added) parts.push('<span class="diff-summary-item" style="background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green)">' + s.added + ' added</span>');
    if (s.removed) parts.push('<span class="diff-summary-item" style="background:color-mix(in srgb,var(--red) 15%,transparent);color:var(--red)">' + s.removed + ' removed</span>');
    if (s.groupCount) parts.push('<span class="diff-summary-item" style="background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)">' + s.groupCount + ' groups</span>');
    if (filteredCascadeClusters.length) {
      var cascadeTotal = filteredCascadeClusters.reduce(function(s, c) { return s + c.elementCount; }, 0);
      parts.push('<span class="diff-summary-item" style="background:color-mix(in srgb,var(--text3) 15%,transparent);color:var(--text3)">' + cascadeTotal + ' cascade</span>');
    }
    summaryEl.innerHTML = parts.join('');

    var html = '';
    var TYPE_CHAR = { changed: '~', added: '+', removed: '−', moved: '↔', 'moved+changed': '↔' };
    var IMP_ORDER = { critical: 0, major: 1, moderate: 2, minor: 3 };

    // Merge groups and ungrouped diffs into a single sorted list
    var entries = [];
    for (var gi = 0; gi < filteredGroups.length; gi++) {
      entries.push({ kind: 'group', group: filteredGroups[gi], score: filteredGroups[gi].score, importance: filteredGroups[gi].importance || 'minor' });
    }
    for (var di = 0; di < filteredDiffs.length; di++) {
      entries.push({ kind: 'diff', diff: filteredDiffs[di], score: filteredDiffs[di].score, importance: filteredDiffs[di].importance || 'minor' });
    }
    entries.sort(function(a, b) {
      var ia = IMP_ORDER[a.importance] != null ? IMP_ORDER[a.importance] : 4;
      var ib = IMP_ORDER[b.importance] != null ? IMP_ORDER[b.importance] : 4;
      return ia !== ib ? ia - ib : (b.score - a.score);
    });

    flatItems = [];
    var PREVIEW_MAX = 4;

    for (var ei = 0; ei < entries.length; ei++) {
      var entry = entries[ei];
      if (entry.kind === 'group') {
        var g = entry.group;
        var imp = g.importance || 'minor';
        var fi = flatItems.length;
        flatItems.push({ kind: 'group', group: g });
        var preview = g.members.slice(0, PREVIEW_MAX).map(function(m) { return esc(m.label); });
        var moreCount = g.members.length - PREVIEW_MAX;
        var previewHtml = preview.join(', ') + (moreCount > 0 ? ', <span class="more">+' + moreCount + ' more…</span>' : '');
        var propNames = g.changes.map(function(c) { return c.property; }).join(', ');
        html += '<div class="el-diff importance-' + imp + '" data-kind="group" data-flat="' + fi + '">'
          + '<div class="el-diff-header">'
          + '<div class="el-diff-badges">'
            + '<span class="el-diff-importance imp-' + imp + '">' + imp + '</span>'
            + '<span class="el-diff-type ' + esc(g.type) + '">' + (TYPE_CHAR[g.type] || '~') + '</span>'
          + '</div>'
          + '<div class="el-diff-title-row">'
            + '<span class="el-diff-label">Multiple Similar &times;' + g.members.length + '</span>'
            + '<span class="group-changes-summary">' + esc(propNames) + '</span>'
          + '</div>'
          + '<div class="group-members-preview">' + previewHtml + '</div>'
          + '</div>'
          + '<div class="el-diff-body">'
          + g.changes.map(function(c) { return renderChange(c); }).join('')
          + '<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:6px">'
          + g.members.map(function(m, mi) {
              return '<div class="group-member-item" data-midx="' + mi + '">'
                + '<span class="member-label">' + esc(m.label) + '</span>'
                + '<span class="member-arrow">→</span>'
                + '</div>';
            }).join('')
          + '</div>'
          + '</div>'
          + '</div>';
      } else {
        var d = entry.diff;
        var imp2 = d.importance || 'minor';
        var fi2 = flatItems.length;
        flatItems.push({ kind: 'diff', diff: d });
        html += '<div class="el-diff importance-' + imp2 + '" data-kind="diff" data-flat="' + fi2 + '">'
          + '<div class="el-diff-header">'
          + '<div class="el-diff-badges">'
            + '<span class="el-diff-importance imp-' + imp2 + '">' + imp2 + '</span>'
            + '<span class="el-diff-type ' + esc(d.type) + '">' + (TYPE_CHAR[d.type] || '~') + '</span>'
          + '</div>'
          + '<div class="el-diff-title-row">'
            + '<span class="el-diff-label">' + esc(d.label) + '</span>'
            + (d.changes.length > 1 ? '<span class="el-diff-count">' + d.changes.length + '</span>' : '')
          + '</div>'
          + '</div>'
          + '<div class="el-diff-body">'
          + (d.selector ? '<div class="el-diff-selector">' + esc(d.selector) + '</div>' : '')
          + d.changes.map(function(c) { return renderChange(c); }).join('')
          + '</div>'
          + '</div>';
      }
    }

    // Cascade clusters — rendered at the bottom as collapsed noise
    if (filteredCascadeClusters.length > 0) {
      html += '<div class="cascade-section-header">Layout Cascade</div>'
        + '<div class="cascade-section-desc">Size changes inherited from a parent reflow — grouped by property &amp; direction, avg delta shown.</div>';
      for (var ci = 0; ci < filteredCascadeClusters.length; ci++) {
        var cc = filteredCascadeClusters[ci];
        var fi3 = flatItems.length;
        flatItems.push({ kind: 'cascade', cluster: cc });
        var ccPreview = cc.members.slice(0, PREVIEW_MAX).map(function(m) { return esc(m.label); });
        var ccMore = cc.members.length - PREVIEW_MAX;
        var ccPreviewHtml = ccPreview.join(', ') + (ccMore > 0 ? ', <span class="more">+' + ccMore + ' more…</span>' : '');
        var rootCauseHtml = '';
        if (cc.rootCause) {
          rootCauseHtml = '<div class="cascade-root-cause">Caused by <strong>' + esc(cc.rootCause.label) + '</strong>: '
            + esc(cc.rootCause.property) + ' ' + esc(cc.rootCause.before) + ' → ' + esc(cc.rootCause.after) + '</div>';
        }
        html += '<div class="el-diff is-cascade" data-kind="cascade" data-flat="' + fi3 + '">'
          + '<div class="el-diff-header">'
          + '<div class="el-diff-badges">'
            + '<span class="el-diff-type changed">≈</span>'
          + '</div>'
          + '<div class="el-diff-title-row">'
            + '<span class="cascade-count">' + cc.elementCount + ' elements</span>'
            + '<span class="cascade-delta">' + esc(cc.delta) + '</span>'
          + '</div>'
          + rootCauseHtml
          + '</div>'
          + '<div class="el-diff-body">'
          + '<div class="group-members-preview">' + ccPreviewHtml + '</div>'
          + cc.members.map(function(m, mi) {
              return '<div class="group-member-item" data-midx="' + mi + '">'
                + '<span class="member-label">' + esc(m.label) + '</span>'
                + '<span class="member-arrow">→</span>'
                + '</div>';
            }).join('')
          + '</div>'
          + '</div>';
      }
    }

    diffItemCount = flatItems.length;
    scrollEl.innerHTML = html;

    // Wire up event handlers
    scrollEl.querySelectorAll('.el-diff').forEach(function(diffEl) {
      var idx = parseInt(diffEl.dataset.flat);
      var item = flatItems[idx];
      var header = diffEl.querySelector('.el-diff-header');

      diffEl.addEventListener('mouseenter', function() {
        if (item.kind === 'diff') {
          highlightElement(item.diff.beforeIdx, item.diff.afterIdx, item.diff.type, getChangedProps(item.diff));
        } else if (item.kind === 'group') {
          highlightAllGroupMembers(item.group);
        } else if (item.kind === 'cascade') {
          highlightAllCascadeMembers(item.cluster);
        }
      });
      diffEl.addEventListener('mouseleave', function() { clearHighlights(); });

      header.addEventListener('click', function() {
        setFocusedPane('diff');
        diffCursorIdx = idx;
        diffEl.classList.toggle('open');
        updateDiffCursor();
      });

      // Individual member hover inside expanded body (groups + cascades)
      if (item.kind === 'group') {
        diffEl.querySelectorAll('.group-member-item').forEach(function(memberEl) {
          var m = item.group.members[parseInt(memberEl.dataset.midx)];
          memberEl.addEventListener('mouseenter', function(ev) {
            ev.stopPropagation();
            highlightElement(m.beforeIdx, m.afterIdx, item.group.type);
          });
          memberEl.addEventListener('mouseleave', function(ev) {
            ev.stopPropagation();
            highlightAllGroupMembers(item.group);
          });
        });
      } else if (item.kind === 'cascade') {
        diffEl.querySelectorAll('.group-member-item').forEach(function(memberEl) {
          var m = item.cluster.members[parseInt(memberEl.dataset.midx)];
          memberEl.addEventListener('mouseenter', function(ev) {
            ev.stopPropagation();
            highlightElement(m.beforeIdx, m.afterIdx, 'changed');
          });
          memberEl.addEventListener('mouseleave', function(ev) {
            ev.stopPropagation();
            highlightAllCascadeMembers(item.cluster);
          });
        });
      }
    });

    updateDiffCursor();
  }

  function updateDiffCursor() {
    var scrollEl = document.getElementById('diff-scroll');
    var items = scrollEl.querySelectorAll('.el-diff');
    items.forEach(function(el, i) {
      el.classList.toggle('kb-focused', i === diffCursorIdx && focusedPane === 'diff');
    });
    if (diffCursorIdx >= 0 && diffCursorIdx < items.length && focusedPane === 'diff') {
      items[diffCursorIdx].scrollIntoView({ block: 'nearest' });
      var fi = flatItems[diffCursorIdx];
      if (fi) {
        if (fi.kind === 'diff') highlightElement(fi.diff.beforeIdx, fi.diff.afterIdx, fi.diff.type, getChangedProps(fi.diff));
        else if (fi.kind === 'group') highlightAllGroupMembers(fi.group);
        else if (fi.kind === 'cascade') highlightAllCascadeMembers(fi.cluster);
      }
    }
  }

  var COLOR_PROPS = ['color', 'background-color', 'border-top-color', 'border-right-color',
    'border-bottom-color', 'border-left-color', 'text-decoration-color', 'outline-color',
    'box-shadow', 'text-shadow',
    'foreground color', 'border-color'];
  var COLOR_RE = /^(#[0-9a-f]{3,8}|rgba?\([^)]+\)|hsla?\([^)]+\)|oklch\([^)]+\))$/i;

  function isColorValue(val) {
    return val && COLOR_RE.test(val.trim());
  }

  function rgbToOklch(val) {
    var m = val.match(/^rgba?\(\s*([\d.]+),\s*([\d.]+),\s*([\d.]+)/);
    if (!m) return val;
    var alpha = 1;
    var am = val.match(/^rgba\(\s*[\d.]+,\s*[\d.]+,\s*[\d.]+,\s*([\d.]+)\s*\)$/);
    if (am) alpha = parseFloat(am[1]);
    var r = parseFloat(m[1]) / 255, g = parseFloat(m[2]) / 255, b = parseFloat(m[3]) / 255;
    var toLinear = function(c) { return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4); };
    var lr = toLinear(r), lg = toLinear(g), lb = toLinear(b);
    var l_ = Math.cbrt(0.4122214708 * lr + 0.5363325363 * lg + 0.0514459929 * lb);
    var m_ = Math.cbrt(0.2119034982 * lr + 0.6806995451 * lg + 0.1073969566 * lb);
    var s_ = Math.cbrt(0.0883024619 * lr + 0.2817188376 * lg + 0.6299787005 * lb);
    var L = 0.2104542553 * l_ + 0.7936177850 * m_ - 0.0040720468 * s_;
    var a = 1.9779984951 * l_ - 2.4285922050 * m_ + 0.4505937099 * s_;
    var ob = 0.0259040371 * l_ + 0.7827717662 * m_ - 0.8086757660 * s_;
    var C = Math.sqrt(a * a + ob * ob);
    var H = (Math.atan2(ob, a) * 180 / Math.PI + 360) % 360;
    var round = function(v, d) { var f = Math.pow(10, d); return Math.round(v * f) / f; };
    if (alpha < 1) return 'oklch(' + round(L, 4) + ' ' + round(C, 4) + ' ' + round(H, 2) + ' / ' + round(alpha, 2) + ')';
    return 'oklch(' + round(L, 4) + ' ' + round(C, 4) + ' ' + round(H, 2) + ')';
  }

  function swatch(val) {
    if (!isColorValue(val)) return '';
    return '<span class="color-swatch" style="background:' + esc(val.trim()) + '" title="' + esc(val) + '"></span>';
  }

  function renderValLine(sign, cls, val, isColor) {
    var displayVal = (isColor && isColorValue(val)) ? rgbToOklch(val) : val;
    return '<div class="change-val-line">'
      + '<span class="val-sign ' + cls + '">' + sign + '</span>'
      + (isColor && isColorValue(val) ? swatch(val) : '')
      + '<span class="val-text ' + cls + '">' + esc(displayVal) + '</span>'
      + '</div>';
  }

  function renderChange(c) {
    var isColor = COLOR_PROPS.indexOf(c.property) !== -1;
    var lines = '';
    if (c.before && c.after) {
      lines = renderValLine('−', 'before', c.before, isColor)
            + renderValLine('+', 'after', c.after, isColor);
    } else if (c.before) {
      lines = renderValLine('−', 'before', c.before, isColor)
            + '<div class="change-val-line"><span class="val-sign after">+</span><span class="val-text added-note">removed</span></div>';
    } else if (c.after) {
      lines = '<div class="change-val-line"><span class="val-sign before">−</span><span class="val-text added-note">none</span></div>'
            + renderValLine('+', 'after', c.after, isColor);
    }
    return '<div class="change-row">'
      + '<div class="change-header">'
        + '<span class="change-prop">' + esc(c.property) + '</span>'
        + '<span class="change-cat">' + esc(c.category) + '</span>'
      + '</div>'
      + lines
      + '</div>';
  }

  // ── Keyboard ─────────────────────────────────────────────────

  document.addEventListener('keydown', function(e) {
    var tag = document.activeElement && document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') {
      if (e.key === 'Escape') document.activeElement.blur();
      return;
    }

    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      if (focusedPane === 'diff') {
        setFocusedPane('sidebar');
      }
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      if (focusedPane === 'sidebar' && diffPanelOpen) {
        setFocusedPane('diff');
      }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (focusedPane === 'sidebar') {
        if (selected == null) selectItem(0);
        else if (selected > 0) selectItem(selected - 1);
      } else if (focusedPane === 'diff') {
        if (diffCursorIdx > 0) {
          diffCursorIdx--;
          updateDiffCursor();
        }
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (focusedPane === 'sidebar') {
        if (selected == null) selectItem(0);
        else if (selected < DATA.length - 1) selectItem(selected + 1);
      } else if (focusedPane === 'diff') {
        if (diffCursorIdx < diffItemCount - 1) {
          diffCursorIdx++;
          updateDiffCursor();
        }
      }
    } else if (e.key === 'Enter' || e.key === ' ') {
      if (focusedPane === 'diff' && diffCursorIdx >= 0) {
        e.preventDefault();
        var items = document.getElementById('diff-scroll').querySelectorAll('.el-diff');
        if (items[diffCursorIdx]) items[diffCursorIdx].classList.toggle('open');
      }
    } else if (e.key === '1') {
      viewMode = 'split'; renderViewer();
    } else if (e.key === '2') {
      viewMode = 'before'; renderViewer();
    } else if (e.key === '3') {
      viewMode = 'after'; renderViewer();
    } else if (e.key === 'v' || e.key === 'V') {
      cycleViewport();
    } else if (e.key === 'd' || e.key === 'D') {
      diffPanelOpen = !diffPanelOpen;
      document.getElementById('diff-panel').classList.toggle('collapsed', !diffPanelOpen);
      if (!diffPanelOpen && focusedPane === 'diff') setFocusedPane('sidebar');
    } else if (e.key === '[') {
      var bothOpen = sidebarOpen && diffPanelOpen;
      var bothClosed = !sidebarOpen && !diffPanelOpen;
      if (bothClosed) {
        sidebarOpen = true;
        diffPanelOpen = true;
      } else {
        sidebarOpen = false;
        diffPanelOpen = false;
      }
      document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
      document.getElementById('diff-panel').classList.toggle('collapsed', !diffPanelOpen);
      if (!diffPanelOpen && focusedPane === 'diff') setFocusedPane('sidebar');
    }
  });

  // ── Wiring ───────────────────────────────────────────────────

  document.getElementById('panel-toggle').addEventListener('click', function() {
    sidebarOpen = !sidebarOpen;
    document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  });

  buildViewportSelector();
  document.getElementById('sidebar-search').addEventListener('input', renderSidebar);
  document.getElementById('diff-search').addEventListener('input', function() {
    diffCursorIdx = -1;
    renderDiffPanel();
  });

  // ── Init ─────────────────────────────────────────────────────

  setViewport(activeViewport);

  buildPills();
  renderSidebar();
  renderViewer();
  renderDiffPanel();
  setFocusedPane('sidebar');

  if (DATA.length > 0) selectItem(0);

  // ── Resizable panels ─────────────────────────────────────────

  var dragOverlay = document.createElement('div');
  dragOverlay.style.cssText = 'position:fixed;inset:0;z-index:9999;cursor:col-resize;display:none;';
  document.body.appendChild(dragOverlay);

  document.querySelectorAll('.resize-handle').forEach(function(handle) {
    var targetId = handle.dataset.target;
    var panel = document.getElementById(targetId);
    var cssVar = targetId === 'sidebar' ? '--panel-width' : '--diff-panel-width';
    var storageKey = 'vr-' + targetId + '-width';
    var saved = localStorage.getItem(storageKey);
    if (saved) {
      document.documentElement.style.setProperty(cssVar, saved + 'px');
    }

    handle.addEventListener('mousedown', function(e) {
      e.preventDefault();
      handle.classList.add('dragging');
      dragOverlay.style.display = 'block';
      var startX = e.clientX;
      var startW = panel.getBoundingClientRect().width;

      function onMove(e) {
        var newW = Math.max(150, Math.min(600, startW + e.clientX - startX));
        document.documentElement.style.setProperty(cssVar, newW + 'px');
      }
      function onUp() {
        handle.classList.remove('dragging');
        dragOverlay.style.display = 'none';
        var finalW = panel.getBoundingClientRect().width;
        localStorage.setItem(storageKey, String(Math.round(finalW)));
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
})();
</script>
</body>
</html>
